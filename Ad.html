<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranch Management</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 20%, #2a2f7a 0%, transparent 40%),
    radial-gradient(circle at 80% 30%, #1c6eff 0%, transparent 40%),
    radial-gradient(circle at 50% 80%, #6a00ff 0%, transparent 40%),
    #0b1026;
  color:white;
  padding:20px;
}

/* Title */
.title{
  text-align:center;
  font-size:22px;
  font-weight:600;
  margin-bottom:25px;
  opacity:.9;
}

/* Ultra Glass Card */
.card{
  position:relative;
  border-radius:24px;
  padding:22px;
  margin-bottom:22px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(25px);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:
    0 0 40px rgba(0,255,255,0.15),
    inset 0 0 25px rgba(255,255,255,0.05);
  overflow:hidden;
}

/* Glow Border Effect */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:24px;
  padding:1px;
  background:linear-gradient(120deg,#00e5ff,#7c4dff,#00ff99);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  opacity:.4;
}

/* Stat Row */
.row{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  font-size:14px;
}

.green{ color:#00ff99; }
.red{ color:#ff4d6d; }
.blue{ color:#00e5ff; }

/* Divider */
hr{
  border:none;
  height:1px;
  background:rgba(255,255,255,0.1);
  margin:14px 0;
}

/* Neon Button */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:16px;
  font-weight:600;
  cursor:pointer;
  margin-top:15px;
  transition:.25s;
  position:relative;
  overflow:hidden;
}

.btn-green{
  background:linear-gradient(45deg,#00ff99,#00c853);
  color:black;
  box-shadow:0 0 25px rgba(0,255,153,.6);
}

.btn-purple{
  background:linear-gradient(45deg,#7c4dff,#b388ff);
  box-shadow:0 0 25px rgba(140,82,255,.6);
}

.btn-blue{
  background:linear-gradient(45deg,#00e5ff,#2979ff);
  box-shadow:0 0 25px rgba(0,200,255,.6);
}

.btn:hover{
  transform:scale(1.04);
}

/* Progress */
.progress{
  height:8px;
  background:rgba(255,255,255,.1);
  border-radius:20px;
  overflow:hidden;
  margin-top:10px;
}

.progress-bar{
  height:100%;
  background:linear-gradient(90deg,#00e5ff,#00ff99);
  box-shadow:0 0 15px rgba(0,255,255,.8);
}

/* Level Block */
.level{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-radius:18px;
  margin-top:14px;
  background:rgba(255,255,255,.05);
  box-shadow: inset 0 0 10px rgba(255,255,255,.05);
}

.badge{
  background:linear-gradient(45deg,#ff9800,#ffb74d);
  padding:5px 12px;
  border-radius:12px;
  font-size:12px;
  font-weight:bold;
  margin-right:10px;
}

</style>
</head>

<body>

<div class="title">🐄 Ranch Management</div>

<!-- Overview -->
<div class="card">

  <div class="row">
    <div>Total Cows</div>
    <div>500</div>
  </div>

  <div class="row">
    <div>Active</div>
    <div class="green">420</div>
  </div>

  <div class="row">
    <div>Inactive</div>
    <div class="red">80</div>
  </div>

  <hr>

  <div class="row">
    <div>Daily Production</div>
    <div>250,000 Milk</div>
  </div>

  <div class="row">
    <div>Activation Cost</div>
    <div>75,000 Milk</div>
  </div>

  <div class="row">
    <div>Net Profit</div>
    <div class="blue">175,000 Milk</div>
  </div>

  <button class="btn btn-green">
    Activate All (75,000 Milk)
  </button>

</div>

<!-- Storage -->
<div class="card">

  <div class="row">
    <div>Milk Storage</div>
    <div>18,000 / 20,000</div>
  </div>

  <div class="progress">
    <div class="progress-bar" style="width:90%"></div>
  </div>

  <button class="btn btn-blue">
    Expand Storage (3,000 Milk)
  </button>

</div>

<!-- Levels -->
<div class="card">

  <div class="level">
    <div>
      <span class="badge">Level 1</span>
      320 Cows
    </div>
    <div>500/day</div>
  </div>
  <button class="btn btn-purple">Upgrade Selected</button>

  <div class="level">
    <div>
      <span class="badge">Level 2</span>
      150 Cows
    </div>
    <div>1000/day</div>
  </div>
  <button class="btn btn-purple">Upgrade Selected</button>

  <div class="level">
    <div>
      <span class="badge">Level 3</span>
      30 Cows
    </div>
    <div>2000/day</div>
  </div>

</div>

</body>
</html>
