<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
  background: black;
  font-family: Arial;
}

/* الشاشة كاملة */
.game {
  position: fixed;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* الطريق */
.road {
  position: absolute;
  width: 100%;
  height: 200%;
  background: url('https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/115d1968-3532-431f-a925-211081b52ebf.png') repeat-y;
  background-size: cover;
}

/* العربيات */
.car {
  position: absolute;
  width: 180px; /* كبرنا الحجم */
  bottom: 60px;
}

/* كل عربية في حارة ثابتة */
.car1 {
  left: 30%;
}

.car2 {
  left: 55%;
}

/* خط النهاية */
.finish {
  position: absolute;
  width: 70%;
  left: 15%;
  top: -1200px;
  transform: scale(0.6);
}

/* UI */
.timer {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 24px;
  background: rgba(0,0,0,0.5);
  padding: 6px 15px;
  border-radius: 20px;
}

.speed {
  position: absolute;
  top: 15px;
  color: white;
  font-size: 14px;
}

.leftSpeed { left: 10px; }
.rightSpeed { right: 10px; }

</style>
</head>

<body>

<div class="game">

  <!-- الطريق -->
  <div class="road"></div>

  <!-- خط النهاية -->
  <img src="https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/83d56c13-1651-4819-8aeb-708111194c39.png" class="finish">

  <!-- العربيات -->
  <img src="https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/26fa6d91-973f-456a-b7e6-da1ddca47322.png" class="car car1">
  
  <img src="https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/f4695289-cd28-4737-b5b6-ec968e9b816d.png" class="car car2">

  <!-- UI -->
  <div class="timer" id="timer">15</div>
  <div class="speed leftSpeed" id="speed1"></div>
  <div class="speed rightSpeed" id="speed2"></div>

</div>

<script>

let road = document.querySelector('.road');
let finish = document.querySelector('.finish');

let roadY = 0;

// سرعات مختلفة
let speed1 = Math.random() * 30 + 70;
let speed2 = Math.random() * 30 + 70;

document.getElementById("speed1").innerText = Math.floor(speed1) + " km/h";
document.getElementById("speed2").innerText = Math.floor(speed2) + " km/h";

// المسافات
let dist1 = 0;
let dist2 = 0;

let finishTop = -1200;
let raceEnd = false;

function gameLoop() {

  if (raceEnd) return;

  // تحريك الطريق (الإحساس بالحركة)
  roadY += 12;
  road.style.backgroundPositionY = roadY + "px";

  // تحريك النهاية
  finishTop += 5;
  finish.style.top = finishTop + "px";

  // تكبير النهاية تدريجي
  let scale = 0.6 + (finishTop + 1200) / 2000;
  finish.style.transform = "scale(" + scale + ")";

  // تحديث المسافات (بدون تحريك يمين/شمال)
  dist1 += speed1 * 0.02;
  dist2 += speed2 * 0.02;

  // نهاية السباق
  if (finishTop > window.innerHeight - 200) {
    raceEnd = true;

    setTimeout(() => {
      if (dist1 > dist2) {
        alert("🏆 اللاعب الأول فاز!");
      } else {
        alert("🏆 اللاعب الثاني فاز!");
      }
    }, 300);
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();

// تايمر
let time = 15;
let timer = setInterval(() => {
  time--;
  document.getElementById("timer").innerText = time;

  if (time <= 0) clearInterval(timer);
}, 1000);

</script>

</body>
</html>
