<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

.game {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* الطريق الجديد */
.road {
  position: absolute;
  width: 100%;
  height: 200%;
  background: url('https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/c34a7a91-ed1a-4fb6-9649-284823cc77d8.png') repeat-y;
  background-size: cover;
}

/* العربيات */
.car {
  position: absolute;
  width: 130px;
  bottom: 80px;
  transition: transform 0.2s;
}

.car1 { left: 30%; }
.car2 { left: 60%; }

/* خط النهاية */
.finish {
  position: absolute;
  width: 80%;
  left: 10%;
  top: -1200px;
  transform: scale(0.5);
}

/* UI */
.timer {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 26px;
  background: rgba(0,0,0,0.5);
  padding: 8px 18px;
  border-radius: 20px;
}

.speed {
  position: absolute;
  top: 20px;
  color: white;
  font-size: 16px;
}

.leftSpeed { left: 15px; }
.rightSpeed { right: 15px; }

</style>
</head>

<body>

<div class="game">

  <!-- الطريق -->
  <div class="road"></div>

  <!-- خط النهاية -->
  <img src="https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/83d56c13-1651-4819-8aeb-708111194c39.png" class="finish">

  <!-- العربيات -->
  <img src="https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/26fa6d91-973f-456a-b7e6-da1ddca47322.png" class="car car1">
  <img src="https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/f4695289-cd28-4737-b5b6-ec968e9b816d.png" class="car car2">

  <!-- UI -->
  <div class="timer" id="timer">15</div>
  <div class="speed leftSpeed" id="speed1"></div>
  <div class="speed rightSpeed" id="speed2"></div>

</div>

<script>

let road = document.querySelector('.road');
let finish = document.querySelector('.finish');
let car1 = document.querySelector('.car1');
let car2 = document.querySelector('.car2');

let roadY = 0;

// سرعات عشوائية
let speed1 = Math.random() * 30 + 70;
let speed2 = Math.random() * 30 + 70;

// عرض السرعة
document.getElementById("speed1").innerText = Math.floor(speed1) + " km/h";
document.getElementById("speed2").innerText = Math.floor(speed2) + " km/h";

// مسافات
let dist1 = 0;
let dist2 = 0;

let finishTop = -1200;
let raceEnd = false;

// اللعبة
function gameLoop() {

  if (raceEnd) return;

  // حركة الطريق
  roadY += 12;
  road.style.backgroundPositionY = roadY + "px";

  // حركة النهاية
  finishTop += 5;
  finish.style.top = finishTop + "px";

  // تكبير النهاية تدريجي
  let scale = 0.5 + (finishTop + 1200) / 2000;
  finish.style.transform = "scale(" + scale + ")";

  // تحديث المسافات
  dist1 += speed1 * 0.02;
  dist2 += speed2 * 0.02;

  // حركة العربيات
  car1.style.transform = "translateX(" + dist1 * 0.2 + "px)";
  car2.style.transform = "translateX(" + dist2 * 0.2 + "px)";

  // نهاية السباق
  if (finishTop > window.innerHeight - 250) {
    raceEnd = true;

    setTimeout(() => {
      if (dist1 > dist2) {
        alert("🏆 اللاعب الأول فاز!");
      } else {
        alert("🏆 اللاعب الثاني فاز!");
      }
    }, 300);
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();

// تايمر
let time = 15;
let timer = setInterval(() => {
  time--;
  document.getElementById("timer").innerText = time;

  if (time <= 0) clearInterval(timer);
}, 1000);

</script>

</body>
</html>
