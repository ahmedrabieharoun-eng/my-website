<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranch Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  overflow-x:hidden;
  background:#0b1026;
  color:white;
}

/* Animated Background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, #2f3cff55, transparent 40%),
    radial-gradient(circle at 80% 20%, #00e5ff55, transparent 40%),
    radial-gradient(circle at 50% 90%, #7c4dff55, transparent 40%);
  animation: bgMove 12s infinite alternate ease-in-out;
  z-index:-1;
}

@keyframes bgMove{
  0%{transform:scale(1) rotate(0deg);}
  100%{transform:scale(1.1) rotate(3deg);}
}

.container{
  padding:20px;
  max-width:520px;
  margin:auto;
}

.title{
  text-align:center;
  font-size:24px;
  font-weight:600;
  margin-bottom:25px;
  opacity:.95;
}

/* Glass Card */
.card{
  position:relative;
  border-radius:26px;
  padding:24px;
  margin-bottom:25px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:
    0 0 50px rgba(0,255,255,.15),
    inset 0 0 25px rgba(255,255,255,.05);
  overflow:hidden;
}

/* Moving Light Overlay */
.card::after{
  content:"";
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.15),transparent);
  transform:rotate(25deg);
  animation:shine 5s infinite linear;
}

@keyframes shine{
  0%{transform:translateX(-100%) rotate(25deg);}
  100%{transform:translateX(100%) rotate(25deg);}
}

/* Animated Gradient Border */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:26px;
  padding:1.5px;
  background:linear-gradient(120deg,#00e5ff,#7c4dff,#00ff99,#00e5ff);
  background-size:300% 300%;
  animation:borderMove 6s linear infinite;
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
}

@keyframes borderMove{
  0%{background-position:0% 50%;}
  100%{background-position:100% 50%;}
}

.row{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  font-size:14px;
}

.green{color:#00ff99;}
.red{color:#ff4d6d;}
.blue{color:#00e5ff;}

hr{
  border:none;
  height:1px;
  background:rgba(255,255,255,.1);
  margin:15px 0;
}

/* Neon Buttons */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:18px;
  font-weight:600;
  cursor:pointer;
  margin-top:15px;
  transition:.25s;
}

.btn-green{
  background:linear-gradient(45deg,#00ff99,#00c853);
  color:black;
  box-shadow:0 0 25px rgba(0,255,153,.7);
}

.btn-purple{
  background:linear-gradient(45deg,#7c4dff,#b388ff);
  box-shadow:0 0 25px rgba(140,82,255,.7);
}

.btn-blue{
  background:linear-gradient(45deg,#00e5ff,#2979ff);
  box-shadow:0 0 25px rgba(0,200,255,.7);
}

.btn:hover{
  transform:scale(1.05);
}

/* Progress */
.progress{
  height:10px;
  background:rgba(255,255,255,.1);
  border-radius:20px;
  overflow:hidden;
  margin-top:12px;
}

.progress-bar{
  height:100%;
  background:linear-gradient(90deg,#00e5ff,#00ff99);
  box-shadow:0 0 20px rgba(0,255,255,.9);
}

.level{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  border-radius:20px;
  margin-top:16px;
  background:rgba(255,255,255,.05);
}

.badge{
  background:linear-gradient(45deg,#ff9800,#ffb74d);
  padding:5px 12px;
  border-radius:14px;
  font-size:12px;
  font-weight:bold;
  margin-right:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="title">🐄 Ranch Management</div>

<!-- Overview -->
<div class="card">
  <div class="row"><div>Total Cows</div><div>500</div></div>
  <div class="row"><div>Active</div><div class="green">420</div></div>
  <div class="row"><div>Inactive</div><div class="red">80</div></div>
  <hr>
  <div class="row"><div>Daily Production</div><div>250,000 Milk</div></div>
  <div class="row"><div>Activation Cost</div><div>75,000 Milk</div></div>
  <div class="row"><div>Net Profit</div><div class="blue">175,000 Milk</div></div>
  <button class="btn btn-green">Activate All (75,000 Milk)</button>
</div>

<!-- Storage -->
<div class="card">
  <div class="row"><div>Milk Storage</div><div>18,000 / 20,000</div></div>
  <div class="progress"><div class="progress-bar" style="width:90%"></div></div>
  <button class="btn btn-blue">Expand Storage (3,000 Milk)</button>
</div>

<!-- Levels -->
<div class="card">
  <div class="level"><div><span class="badge">Level 1</span>320 Cows</div><div>500/day</div></div>
  <button class="btn btn-purple">Upgrade Selected</button>
  <div class="level"><div><span class="badge">Level 2</span>150 Cows</div><div>1000/day</div></div>
  <button class="btn btn-purple">Upgrade Selected</button>
  <div class="level"><div><span class="badge">Level 3</span>30 Cows</div><div>2000/day</div></div>
</div>

</div>

</body>
</html>
