<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranch Management</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  background:url('bg.jpg') center/cover no-repeat fixed;
  position:relative;
  color:white;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  backdrop-filter:blur(25px);
  background:rgba(10,15,40,0.75);
  z-index:-1;
}

.container{
  max-width:520px;
  margin:auto;
  padding:20px;
}

.header{
  text-align:center;
  font-size:22px;
  font-weight:600;
  margin-bottom:20px;
}

.card{
  position:relative;
  border-radius:24px;
  padding:22px;
  margin-bottom:22px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:
    0 0 30px rgba(0,255,255,0.15),
    inset 0 0 20px rgba(255,255,255,0.05);
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:24px;
  padding:1.5px;
  background:linear-gradient(120deg,#00e5ff,#7c4dff,#00ff99,#00e5ff);
  background-size:300% 300%;
  animation:borderMove 6s linear infinite;
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
          mask-composite:exclude;
}

@keyframes borderMove{
  0%{background-position:0% 50%;}
  100%{background-position:100% 50%;}
}

.row{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
  font-size:14px;
}

.green{color:#00ff99;}
.red{color:#ff4d6d;}
.blue{color:#00e5ff;}

hr{
  border:none;
  height:1px;
  background:rgba(255,255,255,0.1);
  margin:14px 0;
}

.btn{
  padding:12px;
  border:none;
  border-radius:16px;
  font-weight:600;
  cursor:pointer;
  margin-top:12px;
  transition:.25s;
  display:inline-block;
}

.btn-green{
  background:linear-gradient(45deg,#00ff99,#00c853);
  color:black;
  box-shadow:0 0 20px rgba(0,255,153,.6);
}

.btn-purple{
  background:linear-gradient(45deg,#7c4dff,#b388ff);
  box-shadow:0 0 20px rgba(140,82,255,.6);
}

.btn-blue{
  background:linear-gradient(45deg,#00e5ff,#2979ff);
  box-shadow:0 0 20px rgba(0,200,255,.6);
}

.progress{
  height:8px;
  background:rgba(255,255,255,.1);
  border-radius:20px;
  overflow:hidden;
  margin-top:10px;
}

.progress-bar{
  height:100%;
  background:linear-gradient(90deg,#00e5ff,#00ff99);
  box-shadow:0 0 15px rgba(0,255,255,.9);
}

.level{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-radius:18px;
  margin-top:14px;
  background:rgba(255,255,255,.05);
}

.badge{
  background:linear-gradient(45deg,#ff9800,#ffb74d);
  padding:4px 10px;
  border-radius:12px;
  font-size:12px;
  font-weight:bold;
  margin-right:10px;
}

.avatar{
  width:55px;
  height:55px;
  border-radius:15px;
  background:url('cow.png') center/cover no-repeat;
  box-shadow:0 0 15px rgba(0,255,255,.5);
  margin-right:12px;
}

.header-row{
  display:flex;
  align-items:center;
  margin-bottom:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">Ranch Management</div>

<div class="card">

<div class="header-row">
  <div class="avatar"></div>
  <div>
    <div style="font-weight:600;">Ranch Overview</div>
    <div style="font-size:12px;opacity:.7;">Large Ranch Owner</div>
  </div>
</div>

<div class="row"><div>Total Cows</div><div>500</div></div>
<div class="row"><div>Active</div><div class="green">420</div></div>
<div class="row"><div>Inactive</div><div class="red">80</div></div>

<hr>

<div class="row"><div>Daily Production</div><div>250,000 Milk</div></div>
<div class="row"><div>Activation Cost</div><div>75,000 Milk</div></div>
<div class="row"><div>Net</div><div class="blue">175,000 Milk</div></div>

<div style="display:flex;gap:10px;margin-top:15px;">
<button class="btn btn-green">Activate</button>
<button class="btn btn-purple">Upgrade</button>
</div>

</div>

<div class="card">
<div class="row"><div>Milk Storage</div><div>18,000 / 20,000</div></div>
<div class="progress"><div class="progress-bar" style="width:90%"></div></div>
<button class="btn btn-blue" style="width:100%;">Expand Storage</button>
</div>

<div class="card">

<div class="level">
<div><span class="badge">Level 1</span>320 Cows</div>
<div>500/day</div>
</div>

<div class="level">
<div><span class="badge">Level 2</span>150 Cows</div>
<div>1000/day</div>
</div>

<div class="level">
<div><span class="badge">Level 3</span>30 Cows</div>
<div>2000/day</div>
</div>

</div>

</div>

</body>
</html>
