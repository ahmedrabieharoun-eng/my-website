<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Racing Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: Arial;
}

/* الحاوية */
.game {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* الطريق */
.road {
  position: absolute;
  width: 100%;
  height: 200%;
  background: url('https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/115d1968-3532-431f-a925-211081b52ebf.png') repeat-y;
  background-size: cover;
}

/* العربيات */
.car {
  position: absolute;
  width: 120px;
  bottom: 80px;
  transition: left 0.2s linear;
}

.car1 { left: 30%; }
.car2 { left: 60%; }

/* خط النهاية */
.finish {
  position: absolute;
  width: 60%;
  left: 20%;
  top: -200px;
}

/* UI */
.ui {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  color: white;
}

.timer {
  font-size: 30px;
  margin-top: 10px;
}

.speed {
  position: absolute;
  top: 20px;
  color: white;
}

.speed.left { left: 20px; }
.speed.right { right: 20px; }

</style>
</head>

<body>

<div class="game">

  <!-- الطريق -->
  <div class="road"></div>

  <!-- خط النهاية -->
  <img src="https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/83d56c13-1651-4819-8aeb-708111194c39.png" class="finish">

  <!-- العربيات -->
  <img src="https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/26fa6d91-973f-456a-b7e6-da1ddca47322.png" class="car car1">
  
  <img src="https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/f4695289-cd28-4737-b5b6-ec968e9b816d.png" class="car car2">

  <!-- UI -->
  <div class="ui">
    <div class="timer" id="timer">15</div>
  </div>

  <div class="speed left" id="speed1">80 km/h</div>
  <div class="speed right" id="speed2">95 km/h</div>

</div>

<script>

let road = document.querySelector('.road');
let finish = document.querySelector('.finish');
let car1 = document.querySelector('.car1');
let car2 = document.querySelector('.car2');

let roadY = 0;

// السرعات
let speed1 = 80;
let speed2 = 95;

// المسافة
let dist1 = 0;
let dist2 = 0;

// الوقت
let time = 15;

// حركة اللعبة
function gameLoop() {

  // تحريك الطريق
  roadY += 10;
  road.style.backgroundPositionY = roadY + "px";

  // تحريك النهاية
  finish.style.top = (parseInt(finish.style.top || -200) + 5) + "px";

  // حساب المسافة
  dist1 += speed1 * 0.01;
  dist2 += speed2 * 0.01;

  // تحديث مكان العربيات
  car1.style.left = (30 + dist1 * 0.05) + "%";
  car2.style.left = (60 + dist2 * 0.05) + "%";

  requestAnimationFrame(gameLoop);
}

gameLoop();

// التايمر
let timer = setInterval(() => {
  time--;
  document.getElementById("timer").innerText = time;

  if (time <= 0) {
    clearInterval(timer);

    if (dist1 > dist2) {
      alert("🚗 العربية 1 كسبت!");
    } else {
      alert("🚙 العربية 2 كسبت!");
    }
  }
}, 1000);

</script>

</body>
</html>
