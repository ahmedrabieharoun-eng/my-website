<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Race</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

.game {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* الطريق */
.road {
  position: absolute;
  width: 100%;
  height: 200%;
  background: url('https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/115d1968-3532-431f-a925-211081b52ebf.png') repeat-y;
  background-size: cover;
}

/* العربيات */
.car {
  position: absolute;
  width: 110px;
  bottom: 80px;
  transition: left 0.2s linear;
}

.car1 { left: 35%; }
.car2 { left: 55%; }

/* خط النهاية */
.finish {
  position: absolute;
  width: 70%;
  left: 15%;
  top: -800px;
}

/* UI */
.ui {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  color: white;
}

.timer {
  font-size: 28px;
  background: rgba(0,0,0,0.5);
  display: inline-block;
  padding: 10px 20px;
  border-radius: 20px;
}

.speed {
  position: absolute;
  top: 20px;
  font-size: 18px;
}

.speed.left { left: 20px; }
.speed.right { right: 20px; }

</style>
</head>

<body>

<div class="game">

  <div class="road"></div>

  <img src="https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/83d56c13-1651-4819-8aeb-708111194c39.png" class="finish">

  <img src="https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/26fa6d91-973f-456a-b7e6-da1ddca47322.png" class="car car1">
  <img src="https://i.supaimg.com/ec27537b-aa6a-42cf-8ba1-d6850eeea36d/f4695289-cd28-4737-b5b6-ec968e9b816d.png" class="car car2">

  <div class="ui">
    <div class="timer" id="timer">15</div>
  </div>

  <div class="speed left" id="speed1">80 km/h</div>
  <div class="speed right" id="speed2">95 km/h</div>

</div>

<script>

let road = document.querySelector('.road');
let finish = document.querySelector('.finish');
let car1 = document.querySelector('.car1');
let car2 = document.querySelector('.car2');

let roadY = 0;

// السرعات (ممكن تتغير كل سباق)
let speed1 = Math.random() * 40 + 60;
let speed2 = Math.random() * 40 + 60;

// المسافة
let dist1 = 0;
let dist2 = 0;

// الوقت
let time = 15;

// حالة السباق
let raceFinished = false;

// اللعبة
function gameLoop() {

  if (raceFinished) return;

  // تحريك الطريق
  roadY += 10;
  road.style.backgroundPositionY = roadY + "px";

  // تحريك خط النهاية
  let finishTop = parseInt(finish.style.top || -800);
  finishTop += 6;
  finish.style.top = finishTop + "px";

  // تحديث المسافات
  dist1 += speed1 * 0.02;
  dist2 += speed2 * 0.02;

  // تحريك العربيات (فرق السرعة)
  car1.style.left = (35 + dist1 * 0.03) + "%";
  car2.style.left = (55 + dist2 * 0.03) + "%";

  // لما النهاية توصل
  if (finishTop > window.innerHeight - 200) {
    raceFinished = true;

    if (dist1 > dist2) {
      alert("🏆 العربية الأولى فازت!");
    } else {
      alert("🏆 العربية الثانية فازت!");
    }
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();

// التايمر
let timer = setInterval(() => {
  time--;
  document.getElementById("timer").innerText = time;

  if (time <= 0) {
    clearInterval(timer);
  }
}, 1000);

</script>

</body>
</html>
